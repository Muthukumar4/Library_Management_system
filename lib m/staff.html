<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff Dashboard | Library</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins;
  background:linear-gradient(135deg,#134e5e,#71b280);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  width:850px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(15px);
  color:#fff;
}
h2{text-align:center;margin-bottom:20px;}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
.box{
  padding:20px;
  background:rgba(255,255,255,0.3);
  border-radius:15px;
  text-align:center;
}
</style>
</head>

<body>
<div class="card">
  <h2>Staff Dashboard</h2>
  <div class="grid">
    <div class="box">📘 Issue Book</div>
    <div class="box">📕 Return Book</div>
    <div class="box">👨‍🎓 Student Records</div>
    <div class="box">⏰ Due Management</div>
    <div class="box">📊 Reports</div>
    <div class="box">🚪 Logout</div>
  </div>
</div>
</body>
</html>
