<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Smart Library Automation System - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="main-container">
    <div class="left-panel" aria-label="Library overview">
      <div class="logo-wrap">
        <img src="logo.png" alt="DAIT Logo">
      </div>
    </div>

    <div class="right-panel" aria-label="Login form">
      <div class="login-shell">
        <h1 class="title">Smart Library<br>Automation System</h1>

        <div class="login-card">
          <div class="role-tabs" role="tablist">
            <button class="role-tab" data-role="student" type="button">Student</button>
            <button class="role-tab" data-role="staff" type="button">Staff</button>
            <button class="role-tab active" data-role="admin" type="button">Admin</button>
          </div>

          <input type="hidden" id="role" value="admin">

          <div class="form-group">
            <label id="usernameLabel" for="username">Username</label>
            <div class="input-box">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M12 12c2.76 0 5-2.24 5-5S14.76 2 12 2 7 4.24 7 7s2.24 5 5 5Zm0 2c-3.87 0-7 2.24-7 5v1h14v-1c0-2.76-3.13-5-7-5Z"></path>
                </svg>
              </span>
              <input type="text" id="username" placeholder="Enter username" autocomplete="username">
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-box">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M17 9h-1V7a4 4 0 1 0-8 0v2H7a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2Zm-6 6.73V17a1 1 0 1 0 2 0v-1.27a2 2 0 1 0-2 0ZM10 9V7a2 2 0 1 1 4 0v2h-4Z"></path>
                </svg>
              </span>
              <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
              <button class="toggle-password" id="passwordToggle" type="button" aria-label="Show password">Show</button>
            </div>
            <p class="caps-warning" id="capsWarning" aria-live="polite"></p>
          </div>

          <div class="extra-row">
            <label class="remember-wrap">
              <input type="checkbox" id="rememberMe">
              <span>Remember this device</span>
            </label>

            <button class="forgot-link" type="button" onclick="showForgotPasswordHelp()">Forgot password?</button>
          </div>

          <p class="error-message" id="loginError" aria-live="polite"></p>

          <button class="login-btn" type="button" onclick="login()">
            <span class="loader" aria-hidden="true"></span>
            <span class="btn-text">Login</span>
          </button>

          <p class="help-text">
            Need help? Visit the library desk or email
            <a href="mailto:library@dait.edu">library@dait.edu</a>.
          </p>
        </div>
      </div>
    </div>
  </div>

<script>
const BASE_URL =
  window.LMS_API_BASE_URL ||
  localStorage.getItem("lmsApiBaseUrl") ||
  document.querySelector('meta[name="api-base-url"]')?.content ||
  "http://localhost:8080";
const loginError = document.getElementById("loginError");
const passwordInput = document.getElementById("password");
const roleButtons = document.querySelectorAll(".role-tab");
const loginButton = document.querySelector(".login-btn");
const rememberMeCheckbox = document.getElementById("rememberMe");
const usernameInput = document.getElementById("username");
const capsWarning = document.getElementById("capsWarning");
const passwordToggle = document.getElementById("passwordToggle");
const destinationByRole = {
  student: "student.html",
  staff: "staff.html",
  admin: "admin.html"
};
let passwordHideTimer = null;
let sessionRestoreInFlight = false;

function hidePassword() {
  if (!passwordInput || !passwordToggle) return;
  passwordInput.type = "password";
  passwordToggle.textContent = "Show";
  passwordToggle.setAttribute("aria-label", "Show password");
  if (passwordHideTimer) {
    clearTimeout(passwordHideTimer);
    passwordHideTimer = null;
  }
}

function showPasswordTemporarily() {
  if (!passwordInput || !passwordToggle) return;
  passwordInput.type = "text";
  passwordToggle.textContent = "Hide";
  passwordToggle.setAttribute("aria-label", "Hide password");
  if (passwordHideTimer) clearTimeout(passwordHideTimer);
  passwordHideTimer = setTimeout(() => {
    hidePassword();
  }, 2000);
}

function clearLoginFields() {
  if (usernameInput) usernameInput.value = "";
  if (passwordInput) passwordInput.value = "";
  clearError();
  updateCapsWarning(false);
}

function setRole(role, clearTypedValues = false){
  const roleInput = document.getElementById("role");
  if (roleInput) roleInput.value = role;

  roleButtons.forEach(btn => {
    btn.classList.toggle("active", btn.dataset.role === role);
  });

  const usernameLabel = document.getElementById("usernameLabel");
  const usernameInput = document.getElementById("username");

  if (!usernameLabel || !usernameInput) return;

  if (role === "student") {
    usernameLabel.textContent = "Roll Number";
    usernameInput.placeholder = "Enter roll number";
  } else {
    usernameLabel.textContent = role === "staff" ? "Staff Code or Email" : "Username";
    usernameInput.placeholder = role === "staff" ? "Enter staff code or email" : "Enter username";
  }

  if (clearTypedValues) {
    clearLoginFields();
  }
}

function showError(message){
  if (!loginError) return;
  loginError.textContent = message;
  loginError.classList.add("visible");
}

function clearError(){
  if (!loginError) return;
  loginError.textContent = "";
  loginError.classList.remove("visible");
}

function showForgotPasswordHelp() {
  const message = "Please contact the library desk or email library@dait.edu to reset your password.";
  if (window.Swal) {
    Swal.fire({
      icon: "info",
      title: "Password Reset Help",
      text: message,
      confirmButtonColor: "#2962f0"
    });
    return;
  }
  alert(message);
}

function setLoading(active){
  if (!loginButton) return;
  loginButton.disabled = active;
  loginButton.classList.toggle("loading", active);
  const btnText = loginButton.querySelector(".btn-text");
  if (btnText) btnText.textContent = active ? "Logging in..." : "Login";
}

function getAuthHeader(username, password) {
  return "Basic " + btoa(`${username}:${password}`);
}

function updateCapsWarning(active){
  if (!capsWarning) return;
  capsWarning.textContent = active ? "Caps Lock is ON" : "";
  capsWarning.classList.toggle("visible", active);
}

async function validateBasicAuth(role, username, password) {
  const endpointByRole = {
    admin: `${BASE_URL}/api/books/all`,
    staff: `${BASE_URL}/api/staff/all`,
    student: `${BASE_URL}/api/students/getall`
  };
  const endpoint = endpointByRole[role];
  if (!endpoint) return false;

  const res = await fetch(endpoint, {
    method: "GET",
    headers: {
      "Authorization": getAuthHeader(username, password)
    }
  });
  return res.ok;
}

async function loginAdminWithApi(username, password) {
  try {
    const res = await fetch(`${BASE_URL}/api/admin/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username,
        password
      })
    });

    if (res.ok) {
      return { ok: true };
    }

    if (res.status === 401 || res.status === 403 || res.status === 400 || res.status === 500) {
      return {
        ok: false,
        message: "Invalid admin username or password"
      };
    }

    return {
      ok: false,
      message: `Admin login failed (${res.status})`
    };
  } catch (error) {
    return {
      ok: false,
      message: error?.message || "Unable to login with admin credentials"
    };
  }
}

async function loginStaffWithApi(loginId, password) {
  try {
    const res = await fetch(`${BASE_URL}/api/auth/staff/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        loginId,
        password
      })
    });

    if (res.ok) {
      const payload = await res.json().catch(() => null);
      return {
        ok: Boolean(payload?.success ?? true),
        staff: payload || null,
        message: payload?.message || ""
      };
    }

    if (res.status === 401 || res.status === 403 || res.status === 400 || res.status === 500) {
      return {
        ok: false,
        message: "Invalid staff credentials"
      };
    }

    return {
      ok: false,
      message: `Staff login failed (${res.status})`
    };
  } catch (error) {
    return {
      ok: false,
      message: error?.message || "Unable to login with staff credentials"
    };
  }
}

async function loginStudentWithApi(rollNumber, password) {
  const candidateUrls = [
    `${BASE_URL}/api/students/student/login`,
    `${BASE_URL}/student/login`
  ];

  let lastError = null;
  for (const url of candidateUrls) {
    try {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          rollNumber,
          password
        })
      });

      if (res.ok) {
        const text = (await res.text()).trim();
        return {
          ok: true,
          message: text
        };
      }

      if (res.status === 401 || res.status === 403 || res.status === 400 || res.status === 500) {
        return {
          ok: false,
          message: "Invalid student roll number or password"
        };
      }

      lastError = `Student login failed (${res.status})`;
    } catch (error) {
      lastError = error;
    }
  }

  return {
    ok: false,
    message: lastError?.message || "Unable to login with student credentials"
  };
}

function normalizeRole(role) {
  return role === "admin" || role === "staff" || role === "student" ? role : "admin";
}

function isSupportedRole(role) {
  return role === "admin" || role === "staff" || role === "student";
}

function clearStoredSession() {
  sessionStorage.removeItem("lmsRole");
  sessionStorage.removeItem("lmsUsername");
  sessionStorage.removeItem("lmsAuthHeader");
  sessionStorage.removeItem("lmsStudent");
  sessionStorage.removeItem("lmsStaff");
}

function redirectToRoleDashboard(role) {
  const destination = destinationByRole[role];
  if (destination) {
    window.location.replace(destination);
  }
}

async function redirectIfSessionIsActive() {
  if (sessionRestoreInFlight) return false;

  const role = String(sessionStorage.getItem("lmsRole") || "").trim().toLowerCase();
  const username = String(sessionStorage.getItem("lmsUsername") || "").trim();
  const authHeader = String(sessionStorage.getItem("lmsAuthHeader") || "").trim();

  if (!isSupportedRole(role) || !username || !authHeader) {
    return false;
  }

  sessionRestoreInFlight = true;

  try {
    const res = await fetch(`${BASE_URL}/api/auth/session`, {
      headers: {
        Authorization: authHeader,
        "Cache-Control": "no-store"
      }
    });

    if (!res.ok) {
      clearStoredSession();
      return false;
    }

    const session = await res.json();
    const activeRole = String(session?.role || "").trim().toLowerCase();
    const activeUsername = String(session?.username || "").trim();
    const sessionMatches = activeRole === role && activeUsername.toLowerCase() === username.toLowerCase();

    if (!sessionMatches) {
      clearStoredSession();
      return false;
    }

    redirectToRoleDashboard(role);
    return true;
  } catch (error) {
    clearStoredSession();
    return false;
  } finally {
    sessionRestoreInFlight = false;
  }
}

async function login() {
  const role = normalizeRole(document.getElementById("role")?.value);
  const username = (document.getElementById("username")?.value || "").trim();
  const password = document.getElementById("password")?.value || "";
  let staffResult = null;

  clearError();

  if (!username || !password) {
    showError("Please enter both username and password");
    return;
  }

  setLoading(true);

  try {
    if (role === "student") {
      const result = await loginStudentWithApi(username, password);
      if (!result.ok) {
        showError(result.message || "Invalid student roll number or password");
        return;
      }
    } else if (role === "admin") {
      const result = await loginAdminWithApi(username, password);
      if (!result.ok) {
        showError(result.message || "Invalid admin username or password");
        return;
      }
    } else if (role === "staff") {
      const result = await loginStaffWithApi(username, password);
      if (!result.ok) {
        showError(result.message || "Invalid staff credentials");
        return;
      }
      staffResult = result;
    } else {
      const valid = await validateBasicAuth(role, username, password);
      if (!valid) {
        showError(role === "staff" ? "Invalid staff credentials" : "Invalid admin credentials");
        return;
      }
    }

    if (rememberMeCheckbox?.checked) {
      localStorage.setItem("lmsSavedUsername", username);
      localStorage.setItem("lmsSavedRole", role);
      localStorage.setItem("lmsRememberMe", "true");
    } else {
      localStorage.removeItem("lmsSavedUsername");
      localStorage.removeItem("lmsSavedRole");
      localStorage.removeItem("lmsRememberMe");
    }

    sessionStorage.setItem("lmsRole", role);
    const sessionUsername = role === "staff"
      ? String(staffResult?.staff?.staffCode || username).trim()
      : username;
    sessionStorage.setItem("lmsUsername", sessionUsername);
    sessionStorage.setItem("lmsAuthHeader", getAuthHeader(sessionUsername, password));
    if (role === "student") {
      sessionStorage.setItem("lmsStudent", JSON.stringify({ rollNumber: username }));
      sessionStorage.removeItem("lmsStaff");
    } else {
      sessionStorage.removeItem("lmsStudent");
      if (role === "staff") {
        sessionStorage.setItem("lmsStaff", JSON.stringify(staffResult?.staff || {}));
      } else {
        sessionStorage.removeItem("lmsStaff");
      }
    }

    window.location.replace(destinationByRole[role]);
  } catch (error) {
    showError("Unable to connect to the server. Please try again.");
  } finally {
    setLoading(false);
  }
}

passwordToggle?.addEventListener("click", () => {
  if (passwordInput?.type === "password") {
    showPasswordTemporarily();
  } else {
    hidePassword();
  }
});

passwordInput?.addEventListener("keydown", (event) => {
  updateCapsWarning(event.getModifierState("CapsLock"));
});

passwordInput?.addEventListener("keyup", (event) => {
  updateCapsWarning(event.getModifierState("CapsLock"));
});

passwordInput?.addEventListener("blur", () => {
  updateCapsWarning(false);
  hidePassword();
});

usernameInput?.addEventListener("input", clearError);
passwordInput?.addEventListener("input", clearError);

document.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    login();
  }
});

roleButtons.forEach(button => {
  button.addEventListener("click", () => setRole(button.dataset.role, true));
});

window.addEventListener("pageshow", (event) => {
  if (!event.persisted) return;
  redirectIfSessionIsActive();
});

window.addEventListener("DOMContentLoaded", async () => {
  const redirected = await redirectIfSessionIsActive();
  if (redirected) return;

  const remembered = localStorage.getItem("lmsRememberMe") === "true";
  const savedRole = normalizeRole(localStorage.getItem("lmsSavedRole") || "admin");
  const savedUsername = localStorage.getItem("lmsSavedUsername") || "";

  setRole(savedRole, false);

  if (rememberMeCheckbox) rememberMeCheckbox.checked = remembered;
  if (remembered && usernameInput) usernameInput.value = savedUsername;
});
</script>
</body>
</html>
